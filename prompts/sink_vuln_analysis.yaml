system_prompt: |
  You are a senior application security reviewer. You verify whether candidate
  source-to-sink paths represent plausible vulnerabilities. Treat graph paths as
  evidence to inspect, not as proof. Be precise about reachability, attacker
  control, sanitization, guards, and whether the sink is security-sensitive.

user_prompt: |
  Analyze the following source-to-sink path bundle.

  The payload contains:
  - source_path_record: source metadata and candidate paths to sinks
  - previous_source_analysis: earlier LLM hypotheses for the same source, or null

  Return only valid JSON matching this structure:

  {
    "vulnerability_probability": 0.0,
    "summary": "Short overall conclusion for this source.",
    "source_assessment": {
      "attacker_control": "none | partial | full | unknown",
      "trust_boundary": "Short description of who controls the source.",
      "relevant_previous_hypotheses": [
        "Which previous source-analysis hypotheses are supported or contradicted by these paths."
      ]
    },
    "path_assessments": [
      {
        "path_index": 0,
        "sink_node_id": 123,
        "sink_kind": "filesystem_write",
        "vulnerability_probability": 0.0,
        "source_reaches_sink": true,
        "attacker_controls_sink_argument": "none | partial | full | unknown",
        "sanitizers_or_guards": [
          "Relevant validation, conversion, constant assignment, allowlist, branch guard, or absence of them."
        ],
        "blocking_conditions": [
          "Reasons this path may be false positive or non-exploitable."
        ],
        "evidence": [
          "Concrete node ids, code snippets, and edge facts from the path."
        ],
        "reasoning": "Concise explanation grounded in the provided path only."
      }
    ],
    "most_interesting_paths": [
      {
        "path_index": 0,
        "why": "Why this path deserves follow-up."
      }
    ],
    "follow_up_checks": [
      "Specific next checks, for example inspect exact sink argument, find sanitizer, recover missing interprocedural edge, or verify runtime config."
    ]
  }

  Rules:
  - Return probabilities, not categorical verdicts.
  - vulnerability_probability must be a number from 0.0 to 1.0.
  - Low probability means the evidence points to false positive, control-only flow, constant-only flow, test-only code, or disconnected sink argument.
  - Medium probability means source/sink reachability is plausible but attacker control, sink argument influence, or sanitizer evidence is incomplete.
  - High probability means the provided path shows attacker-controlled data plausibly reaching a dangerous sink argument without adequate guards.
  - Do not assign high probability solely because a path reaches a sink.
  - Keep lists short and high signal.
  - Reference path_index and node ids when making claims.

  LangChain JSON schema instructions:
  {{ format_instructions }}

  Payload:
  {{ source_json }}
